# worker/wrangler.toml
name = 'gex-fetcher'

main = "src/index.js"
compatibility_date = "2025-01-01"

# Bind a KV namespace. Create it with:
#   wrangler kv namespace create GEX_KV
# Then paste the returned id below.
# NOTE: `binding` is the property name on `env` in src/index.js — it MUST be
# exactly GEX_KV (the code reads env.GEX_KV). Renaming it breaks /update with
# "Cannot read properties of undefined (reading 'put')".
[[kv_namespaces]]
binding = "GEX_KV"
id = "d8cee0576bf94c908a621a0949be09d3"

# Secrets (set via `wrangler secret put`):
#   WORKER_SECRET — shared with GitHub Actions for POST /update
#   READ_API_KEY  — shared with NinjaTrader indicator for GET /gex
#   GH_DISPATCH_TOKEN — GitHub fine-grained PAT (repo efirestone81/GexFetcher,
#                       permission Actions: Read and write). Used by scheduled()
#                       to fire the compute workflow via workflow_dispatch.
#                       Set with:  wrangler secret put GH_DISPATCH_TOKEN

# Cloudflare Cron Triggers — punctual, unlike GitHub's best-effort `schedule:`
# (which was firing 1-2h late). Cron is UTC/DST-unaware, so each ET slot needs
# both its EDT and EST UTC hour. We pack both hours into ONE cron's hour field
# (e.g. "13,14") so this is 3 triggers, not 6 — Workers Free caps crons at 5 per
# ACCOUNT. The scheduled() handler dispatches only on the fire whose ET wall-clock
# lands on a target slot; the off-season fire (wrong hour in ET) is skipped.
[triggers]
crons = [
  "32 13,14 * * 1-5",  # 09:32 ET post-open  (13:32 UTC EDT / 14:32 UTC EST)
  "0 16,17 * * 1-5",   # 12:00 ET midday     (16:00 / 17:00 UTC)
  "50 19,20 * * 1-5",  # 15:50 ET pre-close  (19:50 / 20:50 UTC)
]
