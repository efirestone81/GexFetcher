name: Keepalive

# GHA disables scheduled workflows on repos with no activity in 60 days.
# This monthly no-op workflow keeps activity flowing.
on:
  schedule:
    - cron: '0 0 1 * *'   # 1st of each month, midnight UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "ff-gex-service alive at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
