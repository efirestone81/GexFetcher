name: Compute GEX

on:
  # Best-effort cron schedule. GHA cron can be delayed 5-15 min under peak load,
  # which is fine for GEX since OI is stale intraday anyway.
  schedule:
    # UTC times. Markets open 13:30 UTC (09:30 ET) during DST.
    # NOTE: cron is interpreted in UTC; ET-time drifts by 1h between DST and EST.
    - cron: '35 13 * * 1-5'    # 09:35 ET (DST) / 08:35 EST — post-open
    - cron: '0 16 * * 1-5'     # 12:00 ET (DST) / 11:00 EST — midday
    - cron: '55 19 * * 1-5'    # 15:55 ET (DST) / 14:55 EST — pre-close
    - cron: '0 7 * * 2-6'      # 02:00 ET — overnight after OCC posts final OI

  # Manual trigger button in the Actions UI.
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated tickers (blank = all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (print JSON, skip POST)'
        type: boolean
        required: false
        default: false

# Prevent overlapping runs.
concurrency:
  group: compute-gex
  cancel-in-progress: false

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    defaults:
      run:
        working-directory: fetcher

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: fetcher/pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run quick test suite (math correctness gate)
        # If math is broken, do not push bad data to the Worker.
        run: python -m pytest -q tests/test_greeks.py tests/test_gex_engine.py tests/test_futures_mapper.py tests/test_output.py

      - name: Compute and POST GEX
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          TICKERS: ${{ github.event.inputs.tickers }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          LOG_LEVEL: INFO
        run: python -m ffgex_fetcher

      - name: Healthcheck Worker (after POST)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          # Confirm the Worker now reports recent data.
          status_url="${WORKER_URL%/}/health"
          echo "GET $status_url"
          curl -sS --fail --max-time 10 "$status_url" | tee /tmp/health.json
          age=$(python -c "import json; print(json.load(open('/tmp/health.json')).get('age_minutes', 999))")
          echo "Worker reports age=${age}m"
          if [ "$age" -gt 5 ]; then
            echo "::warning::Worker age is ${age}m — POST may not have taken effect"
          fi
