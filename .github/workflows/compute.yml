name: Compute GEX

on:
  # Schedule is UTC. US equity/index options trade 09:30-16:00 ET.
  # We run a post-open snapshot first, then midday and pre-close.
  # Because GitHub cron is UTC and does not track DST, each ET target is listed
  # twice: once for EDT (summer, UTC-4) and once for EST (winter, UTC-5).
  # The "Guard against wrong DST offset" step skips whichever pair belongs to the
  # INACTIVE offset. That guard keys off github.event.schedule (the cron string
  # that fired) -- NOT the execution clock -- so GitHub's cron drift (commonly
  # 5-40 min) cannot push a run across an hour boundary and cause a false skip.
  schedule:
    # ---- Post-open (09:32 ET) ----
    - cron: '32 13 * * 1-5'   # 09:32 ET during EDT (summer)
    - cron: '32 14 * * 1-5'   # 09:32 ET during EST (winter)
    # ---- Midday (12:00 ET) ----
    - cron: '0 16 * * 1-5'    # 12:00 ET during EDT
    - cron: '0 17 * * 1-5'    # 12:00 ET during EST
    # ---- Pre-close (15:50 ET) ----
    - cron: '50 19 * * 1-5'   # 15:50 ET during EDT
    - cron: '50 20 * * 1-5'   # 15:50 ET during EST

  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated tickers (blank = all)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (print JSON, skip POST)'
        type: boolean
        required: false
        default: false

concurrency:
  group: compute-gex
  cancel-in-progress: false

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: fetcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard against wrong DST offset
        id: dstguard
        shell: bash
        run: |
          # Skip the duplicate cron that belongs to the INACTIVE DST offset.
          #
          # Key the decision off the SCHEDULED cron (github.event.schedule) -- the
          # cron string that actually fired -- NOT the execution wall-clock. GitHub
          # cron drift (commonly 5-40 min, worst at the top of the hour) routinely
          # pushes a run across an hour boundary; an execution-clock check would then
          # wrongly skip legit runs (e.g. the 19:50 pre-close firing at 20:0x) and
          # wrongly run the opposite-offset duplicates (e.g. the 20:50 EST cron at
          # 21:1x). github.event.schedule is immune to that drift.
          SCHED="${{ github.event.schedule }}"
          EVENT="${{ github.event_name }}"
          OFFSET=$(TZ=America/New_York date +%z)   # -0400 = EDT, -0500 = EST
          echo "event=$EVENT schedule='$SCHED' ET offset=$OFFSET"

          SKIP=0
          # Only scheduled runs need de-duplication; workflow_dispatch always runs.
          if [ "$EVENT" = "schedule" ]; then
            CRON_HOUR=$(echo "$SCHED" | awk '{print $2}')   # UTC hour field of the firing cron
            if [ "$OFFSET" = "-0400" ]; then
              VALID="13 16 19"     # EDT crons: 09:32, 12:00, 15:50 ET
            else
              VALID="14 17 20"     # EST crons: 09:32, 12:00, 15:50 ET
            fi
            case " $VALID " in
              *" $CRON_HOUR "*) SKIP=0 ;;
              *) SKIP=1 ;;
            esac
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          if [ "$SKIP" = "1" ]; then
            echo "Skipping: cron '$SCHED' belongs to the inactive DST offset ($OFFSET active)."
          fi

      - name: Setup Python
        if: steps.dstguard.outputs.skip != '1'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: fetcher/pyproject.toml

      - name: Install package
        if: steps.dstguard.outputs.skip != '1'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run math correctness gate
        if: steps.dstguard.outputs.skip != '1'
        run: python -m pytest -q tests/test_greeks.py tests/test_gex_engine.py tests/test_futures_mapper.py tests/test_output.py tests/test_0dte.py

      - name: Compute and POST GEX
        if: steps.dstguard.outputs.skip != '1'
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          TICKERS: ${{ github.event.inputs.tickers }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          LOG_LEVEL: INFO
        run: python -m ffgex_fetcher

      - name: Healthcheck Worker
        if: ${{ steps.dstguard.outputs.skip != '1' && github.event.inputs.dry_run != 'true' }}
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          status_url="${WORKER_URL%/}/health"
          curl -sS --fail --max-time 10 "$status_url" | tee /tmp/health.json
          age=$(python -c "import json;print(json.load(open('/tmp/health.json')).get('age_minutes',999))")
          echo "Worker age=${age}m"
