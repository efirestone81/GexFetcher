name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fetcher
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: fetcher/pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Run all Python tests (skip live)
        env:
          SKIP_LIVE_TESTS: '1'
        run: python -m pytest -v

  worker-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run Worker tests
        run: node --test test/worker.test.js
